<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>India Food & Tourism | DTU Project</title>
    <style>
        /* THEME COLORS */
        body { background-color: #F5F5DC; color: #3E2723; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; }
        
        /* HEADER */
        .header { 
            background-color: #3E2723; color: #E1AD01; padding: 50px 20px; 
            text-align: center; border-bottom: 8px solid #E1AD01; 
        }

        .container { padding: 20px; max-width: 800px; margin: auto; }

        /* CITY CARD */
        .city-box { 
            background: white; border-radius: 15px; margin-bottom: 40px; 
            overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
        }
        /* I adjusted the height so your local photos don't look stretched */
        .main-img { width: 100%; height: 350px; object-fit: cover; display: block; } 
        .content { padding: 25px; }
        .city-title { color: #D84315; font-size: 32px; margin: 0 0 10px 0; border-bottom: 3px solid #E1AD01; display: inline-block; }
        
        .label { font-weight: bold; display: block; margin-top: 20px; color: #888; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }

        /* BUTTONS */
        .btn-wrap { margin-top: 10px; }
        .button { 
            display: inline-block; padding: 10px 18px; margin: 4px; 
            border-radius: 25px; cursor: pointer; border: none; font-weight: bold; font-size: 13px;
            transition: transform 0.2s;
        }
        .food-btn { background-color: #E1AD01; color: #3E2723; }
        .place-btn { background-color: #3E2723; color: #E1AD01; }
        .button:hover { transform: scale(1.05); opacity: 0.9; }

        /* MODAL POPUP */
        .modal { 
            display: none; position: fixed; z-index: 1000; left: 0; top: 0; 
            width: 100%; height: 100%; background: rgba(0,0,0,0.95); 
            padding-top: 20px; 
        }
        .modal-card { 
            background: white; margin: auto; width: 95%; max-width: 600px; 
            border-radius: 15px; overflow: hidden; position: relative; 
        }
        .modal-img { width: 100%; height: 350px; object-fit: cover; }
        .modal-text { padding: 25px; text-align: center; }
        .close { position: absolute; top: 10px; right: 20px; color: white; font-size: 45px; cursor: pointer; font-weight: bold; z-index: 1001; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }

        footer { text-align: center; padding: 50px; background: #3E2723; color: #E1AD01; margin-top: 30px; }
    </style>
</head>
<body>

<div class="header">
    <h1 style="margin:0; letter-spacing: 2px;">CITY CHRONICLES</h1>
    <p style="margin:10px 0 0 0; opacity: 0.8;">Metropolitan Food & Tourism Presentation</p>
</div>

<div class="container">

    <div class="city-box">
        <img src="delhi_main.jpg" class="main-img">
        <div class="content">
            <h2 class="city-title">Delhi</h2>
            <span class="label">Landmarks to Explore</span>
            <div class="btn-wrap">
                <button class="button place-btn" onclick="show('Qutub Minar')">Qutub Minar</button>
                <button class="button place-btn" onclick="show('India Gate')">India Gate</button>
            </div>
            <span class="label">Must-Try Food</span>
            <div class="btn-wrap">
                <button class="button food-btn" onclick="show('Chole Bhature')">Chole Bhature</button>
                <button class="button food-btn" onclick="show('Butter Chicken')">Butter Chicken</button>
                <button class="button food-btn" onclick="show('Golgappe')">Golgappe</button>
                <button class="button food-btn" onclick="show('Paratha')">Paratha</button>
            </div>
        </div>
    </div>

    <div class="city-box">
        <img src="mumbai_main.jpg" class="main-img">
        <div class="content">
            <h2 class="city-title">Mumbai</h2>
            <span class="label">Landmarks to Explore</span>
            <div class="btn-wrap">
                <button class="button place-btn" onclick="show('Gateway of India')">Gateway of India</button>
                <button class="button place-btn" onclick="show('Marine Drive')">Marine Drive</button>
            </div>
            <span class="label">Must-Try Food</span>
            <div class="btn-wrap">
                <button class="button food-btn" onclick="show('Vada Pav')">Vada Pav</button>
                <button class="button food-btn" onclick="show('Pav Bhaji')">Pav Bhaji</button>
                <button class="button food-btn" onclick="show('Bhel Puri')">Bhel Puri</button>
                <button class="button food-btn" onclick="show('Bombay Sandwich')">Bombay Sandwich</button>
            </div>
        </div>
    </div>

    <div class="city-box">
        <img src="bangalore_main.jpg" class="main-img">
        <div class="content">
            <h2 class="city-title">Bangalore</h2>
            <span class="label">Landmarks to Explore</span>
            <div class="btn-wrap">
                <button class="button place-btn" onclick="show('Lalbagh')">Lalbagh Garden</button>
                <button class="button place-btn" onclick="show('Bangalore Palace')">Bangalore Palace</button>
            </div>
            <span class="label">Must-Try Food</span>
            <div class="btn-wrap">
                <button class="button food-btn" onclick="show('Masala Dosa')">Masala Dosa</button>
                <button class="button food-btn" onclick="show('Filter Coffee')">Filter Coffee</button>
                <button class="button food-btn" onclick="show('Idli Vada')">Idli Vada</button>
                <button class="button food-btn" onclick="show('Kesari Bath')">Kesari Bath</button>
            </div>
        </div>
    </div>

    <div class="city-box">
        <img src="chennai_main.jpg" class="main-img">
        <div class="content">
            <h2 class="city-title">Chennai</h2>
            <span class="label">Landmarks to Explore</span>
            <div class="btn-wrap">
                <button class="button place-btn" onclick="show('Marina Beach')">Marina Beach</button>
                <button class="button place-btn" onclick="show('Kapaleeshwarar')">Kapaleeshwarar Temple</button>
            </div>
            <span class="label">Must-Try Food</span>
            <div class="btn-wrap">
                <button class="button food-btn" onclick="show('Pongal')">Pongal</button>
                <button class="button food-btn" onclick="show('Chicken 65')">Chicken 65</button>
                <button class="button food-btn" onclick="show('Sambar Rice')">Sambar Rice</button>
                <button class="button food-btn" onclick="show('Mysore Pak')">Mysore Pak</button>
            </div>
        </div>
    </div>

</div>

<div id="pop" class="modal">
    <span class="close" onclick="hide()">&times;</span>
    <div class="modal-card">
        <img id="p-img" class="modal-img" src="">
        <div class="modal-text">
            <h3 id="p-title" style="margin:0 0 10px 0; font-family: 'Playfair Display', serif; color: #3E2723; font-size: 24px;"></h3>
            <p id="p-desc" style="color: #555; line-height: 1.5;"></p>
        </div>
    </div>
</div>

<footer><p>DTU Software Engineering | Project 2026</p></footer>

<script>
    var db = {
        // ASSUMES ALL LOCAL PHOTOS ARE .jpg FORMAT
        // PLACES
        'Qutub Minar': { i: 'delhi_main.jpg', d: 'A UNESCO World Heritage site, this 73m minaret was built in 1193.' },
        'India Gate': { i: 'delhi_gate.jpg', d: 'The iconic war memorial located on the Rajpath in New Delhi.' },
        'Gateway of India': { i: 'mumbai_gateway.jpg', d: 'The 20th-century arch monument looking over the Arabian Sea.' },
        'Marine Drive': { i: 'mumbai_main.jpg', d: 'Known as the Queen\'s Necklace, Mumbai\'s iconic C-shaped promenade.' },
        'Lalbagh': { i: 'bangalore_main.jpg', d: 'Historic 240-acre botanical garden commissioned by Hyder Ali.' },
        'Bangalore Palace': { i: 'bangalore_palace.jpg', d: 'Tudor-style palace known for its elegant wood carvings.' },
        'Marina Beach': { i: 'chennai_main.jpg', d: 'The longest natural urban beach in India, along the Bay of Bengal.' },
        'Kapaleeshwarar': { i: 'chennai_temple.jpg', d: 'Stunning 7th-century Dravidian temple dedicated to Lord Shiva.' },

        // FOOD
        'Chole Bhature': { i: 'delhi_chole.jpg', d: 'Tangy chickpeas served with fluffy deep-fried bread. A Delhi soul food.' },
        'Butter Chicken': { i: 'delhi_butter.jpg', d: 'Tender chicken pieces in a silky, creamy tomato and butter gravy.' },
        'Golgappe': { i: 'delhi_golgappe.jpg', d: 'Crispy shells filled with spicy flavored water and tamarind chutney.' },
        'Paratha': { i: 'delhi_paratha.jpg', d: 'Stuffed flatbreads from the world-famous Gali Paranthe Wali.' },
        'Vada Pav': { i: 'mumbai_vada.jpg', d: 'Mumbai\'s spicy potato burger, served with zesty chutneys.' },
        'Pav Bhaji': { i: 'mumbai_pav.jpg', d: 'Mashed spicy vegetable curry served with buttered bread rolls.' },
        'Bhel Puri': { i: 'mumbai_bhel.jpg', d: 'A light, tangy snack made of puffed rice, chutneys, and fresh veggies.' },
        'Bombay Sandwich': { i: 'mumbai_sandwich.jpg', d: 'Toasted sandwich loaded with masala potatoes and green chutney.' },
        'Masala Dosa': { i: 'bangalore_dosa.jpg', d: 'Crispy rice crepe stuffed with a flavorful potato mash.' },
        'Filter Coffee': { i: 'bangalore_coffee.jpg', d: 'Strong, frothy coffee made with traditionally roasted beans.' },
        'Idli Vada': { i: 'bangalore_idli.jpg', d: 'Steamed rice cakes and crunchy lentil donuts—the ultimate duo.' },
        'Kesari Bath': { i: 'bangalore_kesari.jpg', d: 'Sweet semolina pudding infused with saffron and ghee.' },
        'Pongal': { i: 'chennai_pongal.jpg', d: 'A traditional rice and lentil porridge cooked with black pepper.' },
        'Chicken 65': { i: 'chennai_chicken65.jpg', d: 'The legendary deep-fried spicy chicken appetizer born in Chennai.' },
        'Sambar Rice': { i: 'chennai_sambar.jpg', d: 'Ultimate comfort meal—rice mixed with aromatic lentil stew.' },
        'Mysore Pak': { i: 'chennai_mysorepak.jpg', d: 'A rich and buttery sweet made from besan, sugar, and pure ghee.' }
    };

    function show(key) {
        var item = db[key];
        if(item) {
            document.getElementById('p-title').innerText = key;
            document.getElementById('p-desc').innerText = item.d;
            document.getElementById('p-img').src = item.i;
            document.getElementById('pop').style.display = 'block';
        }
    }

    function hide() {
        document.getElementById('pop').style.display = 'none';
    }
</script>

</body>
</html>
